name: Update Sponsors in README

on:
  sponsorship:
    types: [created, cancelled, tier_changed]
  # Also allow manual trigger for testing
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update sponsors in README.md
        uses: JamesIves/github-sponsors-readme-action@v1
        with:
          token: ${{ secrets.SPONSORS_TOKEN }}
          file: README.md
          organization: false
          minimum: 0

      - name: Update sponsors in README_GER.md
        uses: JamesIves/github-sponsors-readme-action@v1
        with:
          token: ${{ secrets.SPONSORS_TOKEN }}
          file: README_GER.md
          organization: false
          minimum: 0