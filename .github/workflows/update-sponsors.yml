name: Update Sponsors in README

on:
  schedule:
    - cron: '0 3 * * *'  # Täglich um 03:00 UTC
  workflow_dispatch:       # Manuell auslösbar

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Update sponsors in README.md
        uses: JamesIves/github-sponsors-readme-action@v1
        with:
          token: ${{ secrets.SPONSORS_TOKEN }}
          commit-token: ${{ secrets.GITHUB_TOKEN }}
          file: README.md
          organization: true
          minimum: 0
          include-private: true

      - name: Update sponsors in README_GER.md
        uses: JamesIves/github-sponsors-readme-action@v1
        with:
          token: ${{ secrets.SPONSORS_TOKEN }}
          commit-token: ${{ secrets.GITHUB_TOKEN }}
          file: README_GER.md
          organization: true
          minimum: 0
          include-private: true
