name: Update Sponsors in README

on:
  schedule:
    - cron: '0 3 * * *'  # Täglich um 03:00 UTC
  workflow_dispatch:       # Manuell auslösbar

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.SPONSORS_TOKEN }}

      - name: Fetch sponsors and update READMEs
        env:
          SPONSORS_TOKEN: ${{ secrets.SPONSORS_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, re, os

          token = os.environ['SPONSORS_TOKEN']

          query = """
          {
            organization(login: "MSK-Scripts") {
              sponsorshipsAsMaintainer(first: 100, includePrivate: true) {
                nodes {
                  sponsor {
                    ... on User {
                      login
                      avatarUrl
                    }
                  }
                }
              }
            }
          }
          """

          req = urllib.request.Request(
              'https://api.github.com/graphql',
              data=json.dumps({'query': query}).encode(),
              headers={
                  'Authorization': f'bearer {token}',
                  'Content-Type': 'application/json',
              }
          )

          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          print("API response:", json.dumps(data, indent=2))

          nodes = data.get('data', {}).get('organization', {}).get('sponsorshipsAsMaintainer', {}).get('nodes', [])
          sponsors = [n['sponsor'] for n in nodes if n.get('sponsor')]
          print(f"Found {len(sponsors)} sponsor(s): {[s['login'] for s in sponsors]}")

          html = ''.join(
              f'<a href="https://github.com/{s["login"]}"><img src="{s["avatarUrl"]}&s=60" width="60px" alt="{s["login"]}" title="{s["login"]}" /></a>&nbsp;'
              for s in sponsors
          )
          print("Generated HTML:", html if html else "(empty)")

          for filename in ['README.md', 'README_GER.md']:
              with open(filename, 'r', encoding='utf-8') as f:
                  content = f.read()
              updated = re.sub(
                  r'<!-- sponsors -->.*?<!-- sponsors -->',
                  f'<!-- sponsors -->\n{html}\n<!-- sponsors -->',
                  content,
                  flags=re.DOTALL
              )
              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(updated)
              print(f"Updated {filename}")
          PYEOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README_GER.md
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "chore: update sponsors in README [skip ci]"
            git push
          )
