name: 🎫 Auto Release – MSK-Scripts/discord_ticketbot

on:
  push:
    tags:
      - 'v*'   # Trigger bei: v1.0.0, v1.2.3, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Komplette Git-History für Diff

      - name: Geänderte Dateien & Commits ermitteln
        id: changes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURR_TAG="${GITHUB_REF_NAME}"

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
            echo -e "> ⚠️ Erster Release – kein Vergleich mit vorherigem Tag möglich.\n" > release_body.md
          else
            RANGE="$PREV_TAG..$CURR_TAG"
            echo -e "> 🔍 Vergleich: [\`$PREV_TAG\` → \`$CURR_TAG\`](https://github.com/MSK-Scripts/discord_ticketbot/compare/$PREV_TAG...$CURR_TAG)\n" > release_body.md
          fi

          # Commits
          echo "## 📝 Commits" >> release_body.md
          git log $RANGE --pretty=format:"- %s (%an)" >> release_body.md

          # Geänderte Dateien
          echo -e "\n\n## 📂 Geänderte Dateien" >> release_body.md
          echo '```' >> release_body.md
          git diff --name-status $RANGE \
            | sed 's/^A\t/✅  NEU      /;s/^M\t/✏️  Geändert /;s/^D\t/🗑️  Gelöscht /' \
            >> release_body.md
          echo '```' >> release_body.md

          # Statistik
          STATS=$(git diff --shortstat $RANGE 2>/dev/null || echo "Erster Release")
          echo -e "\n---\n📊 **$STATS**" >> release_body.md

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
