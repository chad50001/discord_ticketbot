name: 🎫 Auto Release

on:
  push:
    tags:
      - 'v*'   # Trigger bei: v1.0.0, v1.2.3, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag, der released werden soll (z. B. v1.2.3)'
        required: true
        type: string
      create_tag:
        description: 'Neuen Tag erstellen, falls er noch nicht existiert'
        required: false
        type: boolean
        default: false
      ref:
        description: 'Branch/Commit für den neuen Tag (nur falls oben aktiviert)'
        required: false
        type: string
        default: main

# Verhindert, dass sich zwei Release-Läufe für denselben Tag überschneiden
concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Tag ermitteln — funktioniert sowohl bei Tag-Push als auch bei manueller Ausführung
      - name: Tag ermitteln
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^v ]]; then
            echo "::error::Tag '$TAG' entspricht nicht dem erwarteten Muster 'v*'."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Prerelease-Erkennung: Tags mit Suffix (z. B. v2.0.0-rc.1, v2.0.0-beta)
          # werden als Vorabversion markiert und NICHT als "latest" veröffentlicht.
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
            echo "ℹ️  '$TAG' wird als Prerelease veröffentlicht."
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # Checkout des Tags (falls vorhanden) bzw. des angegebenen Branches (für neue Tags).
      # fetch-depth: 0 holt komplette History + alle Tags.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      # Prüft, ob der Tag existiert. Falls nicht:
      #   - create_tag aktiviert  → Tag wird aus 'ref' erstellt und gepusht
      #   - create_tag deaktiviert → Abbruch mit Hinweis
      - name: Tag prüfen & ggf. erstellen
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "✅ Tag '$TAG' existiert bereits."
            exit 0
          fi

          if [ "${{ inputs.create_tag }}" != "true" ]; then
            echo "::error::Tag '$TAG' existiert nicht. Workflow erneut ausführen und die Option 'Neuen Tag erstellen' aktivieren — der Tag wird dann aus '${{ inputs.ref }}' erstellt."
            exit 1
          fi

          echo "🏷️  Tag '$TAG' existiert nicht — wird aus '${{ inputs.ref }}' erstellt."
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "refs/tags/$TAG"
          echo "✅ Tag '$TAG' erstellt und gepusht."

      # Stellt sicher, dass die Version in package.json zum Tag passt
      # (z. B. Tag v2.0.0 ↔ package.json "version": "2.0.0").
      # Warnung statt Abbruch, damit Hotfix-Tags ohne package.json-Bump möglich bleiben.
      - name: Version gegen Tag prüfen
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          TAG_VERSION="${TAG#v}"
          if [ -f package.json ]; then
            PKG_VERSION="$(node -p "require('./package.json').version")"
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "::warning::Tag-Version ($TAG_VERSION) weicht von package.json ($PKG_VERSION) ab. Wurde der Versions-Bump vergessen?"
            else
              echo "✅ Tag-Version stimmt mit package.json überein ($PKG_VERSION)."
            fi
          else
            echo "::warning::package.json nicht gefunden — Versionsabgleich übersprungen."
          fi

      - name: Modified files & Commits ermitteln
        run: |
          set -euo pipefail
          CURR_TAG="${{ steps.tag.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURR_TAG}^" 2>/dev/null || echo "")
          REPO="${GITHUB_REPOSITORY}"

          if [ -z "$PREV_TAG" ]; then
            RANGE="$CURR_TAG"
            printf '> ⚠️ First Release – no comparison with previous tag possible.\n\n' > release_body.md
          else
            RANGE="$PREV_TAG..$CURR_TAG"
            printf '> 🔍 Comparison: [`%s` → `%s`](https://github.com/%s/compare/%s...%s)\n\n' \
              "$PREV_TAG" "$CURR_TAG" "$REPO" "$PREV_TAG" "$CURR_TAG" > release_body.md
          fi

          # Commits — nur die Betreffzeile (%s) je Commit (keine Bodies, bewusst kompakt).
          # --pretty=format:"...%n" sorgt dafür, dass JEDE Zeile (auch die letzte) mit
          # einem Newline endet; die frühere `while read`-Schleife verschluckte sonst
          # den neuesten Commit (read liefert non-zero bei fehlendem abschließenden
          # Newline → Schleifenkörper wurde übersprungen).
          echo "## 📝 Commits" >> release_body.md
          git log "$RANGE" \
            --pretty=format:"- [\`%h\`](https://github.com/$REPO/commit/%H) %s _(%an)_%n" \
            >> release_body.md

          # Modified files
          printf '\n\n## 📂 Modified files\n' >> release_body.md
          echo '```' >> release_body.md
          git diff --name-status "$RANGE" \
            | sed 's/^A\t/✅  NEW      /;s/^M\t/✏️  CHANGED /;s/^D\t/🗑️  DELETED /' \
            >> release_body.md
          echo '```' >> release_body.md

          # Statistics
          STATS=$(git diff --shortstat "$RANGE" 2>/dev/null || echo "First Release")
          printf '\n---\n📊 **%s**\n' "$STATS" >> release_body.md

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: 🎫 ${{ steps.tag.outputs.tag }}
          body_path: release_body.md
          # Eigener Body enthält bereits Commits (inkl. Beschreibungen),
          # geänderte Dateien und Statistiken — GitHubs Auto-Notes würden die
          # Commit-Liste nur duplizieren. Auf true setzen, falls die
          # "New Contributors"-Sektion gewünscht ist.
          generate_release_notes: false
          prerelease: ${{ steps.tag.outputs.prerelease }}
          make_latest: ${{ steps.tag.outputs.prerelease == 'true' && 'false' || 'true' }}
          token: ${{ secrets.GITHUB_TOKEN }}
