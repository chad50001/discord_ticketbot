name: Secret Scanning (TruffleHog)

# Scans for accidentally committed secrets such as the Discord bot TOKEN,
# CLIENT_ID, MSK_API_KEY or any other credentials from the .env file.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  id-token: write

jobs:
  trufflehog:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
